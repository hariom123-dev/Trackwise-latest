services:
  - type: web
    name: trackwise
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        scope: run
      - key: RAZORPAY_KEY_ID
        scope: run
      - key: RAZORPAY_KEY_SECRET
        scope: run
